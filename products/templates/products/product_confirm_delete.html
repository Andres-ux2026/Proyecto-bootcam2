{% extends 'base.html' %}

{% block title %}Eliminar Producto{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto mt-10">
    <div class="bg-white rounded-xl shadow-md p-8 text-center">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">¿Eliminar "{{ product.name }}"?</h1>
        <p class="text-gray-600 mb-6">Esta acción no se puede deshacer.</p>
        <form method="post">
            {% csrf_token %}
            <div class="flex gap-3 justify-center">
                <button type="submit" class="bg-red-500 text-white py-2 px-6 rounded-lg hover:bg-red-600 font-medium">
                    Eliminar
                </button>
                <a href="{% url 'products:list' %}" class="bg-gray-200 text-gray-700 py-2 px-6 rounded-lg hover:bg-gray-300 font-medium">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
