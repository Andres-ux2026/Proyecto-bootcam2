<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BootCamper E-Commerce{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    {% include 'navbar.html' %}

    <main class="flex-grow container mx-auto px-4 py-6">
        {% if messages %}
            <div class="max-w-4xl mx-auto mb-4 space-y-2">
                {% for message in messages %}
                    <div class="px-4 py-3 rounded-lg shadow-sm text-sm font-medium
                        {% if message.tags == 'success' %}bg-green-100 text-green-800 border border-green-200
                        {% elif message.tags == 'error' %}bg-red-100 text-red-800 border border-red-200
                        {% else %}bg-blue-100 text-blue-800 border border-blue-200{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t mt-8 py-6 text-center text-sm text-gray-500">
        &copy; {% now "Y" %} BootCamper E-Commerce &mdash; Proyecto Portafolio
    </footer>
</body>
</html>
